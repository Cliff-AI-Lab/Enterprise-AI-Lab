<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/><stop offset="50%" stop-color="#111827"/><stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/><stop offset="50%" stop-color="#10b981"/><stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0"/><stop offset="20%" stop-color="#14b8a6" stop-opacity="0.8"/><stop offset="50%" stop-color="#10b981" stop-opacity="1"/><stop offset="80%" stop-color="#818cf8" stop-opacity="0.8"/><stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="20" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="textGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="nGlow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="260" fill="url(#bgGrad)"/>
  <g opacity="0.05" stroke="#14b8a6" stroke-width="0.5">
    <line x1="0" y1="52" x2="1200" y2="52"/><line x1="0" y1="104" x2="1200" y2="104"/><line x1="0" y1="156" x2="1200" y2="156"/><line x1="0" y1="208" x2="1200" y2="208"/>
    <line x1="120" y1="0" x2="120" y2="260"/><line x1="240" y1="0" x2="240" y2="260"/><line x1="360" y1="0" x2="360" y2="260"/><line x1="480" y1="0" x2="480" y2="260"/><line x1="600" y1="0" x2="600" y2="260"/><line x1="720" y1="0" x2="720" y2="260"/><line x1="840" y1="0" x2="840" y2="260"/><line x1="960" y1="0" x2="960" y2="260"/><line x1="1080" y1="0" x2="1080" y2="260"/>
  </g>
  <circle cx="200" cy="130" r="120" fill="#14b8a6" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="1000" cy="130" r="110" fill="#10b981" opacity="0.04" filter="url(#softGlow)"/>
  <!-- Left chart line -->
  <g filter="url(#nGlow)"><polyline points="60,120 85,95 110,108 135,78 160,88" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.45"/><circle cx="60" cy="120" r="2" fill="#14b8a6" opacity="0.6"/><circle cx="135" cy="78" r="2" fill="#10b981" opacity="0.6"/></g>
  <!-- Right bars -->
  <g filter="url(#nGlow)" opacity="0.3"><rect x="1040" y="100" width="12" height="50" rx="2" fill="#14b8a6"/><rect x="1060" y="80" width="12" height="70" rx="2" fill="#10b981"/><rect x="1080" y="110" width="12" height="40" rx="2" fill="#818cf8"/><rect x="1100" y="70" width="12" height="80" rx="2" fill="#14b8a6"/><rect x="1120" y="95" width="12" height="55" rx="2" fill="#10b981"/></g>
  <circle cx="300" cy="40" r="1" fill="#14b8a6" opacity="0.3"/><circle cx="500" cy="200" r="1.2" fill="#10b981" opacity="0.25"/><circle cx="900" cy="220" r="1" fill="#818cf8" opacity="0.25"/>
  <text x="600" y="120" text-anchor="middle" font-family="Plus Jakarta Sans,Inter,system-ui,sans-serif" font-size="44" font-weight="700" fill="url(#titleGrad)" filter="url(#textGlow)" letter-spacing="-1">Market Assistant</text>
  <text x="600" y="158" text-anchor="middle" font-family="Plus Jakarta Sans,Inter,system-ui,sans-serif" font-size="15" fill="#8B949E" letter-spacing="3.5" font-weight="400">AGRI-LIVESTOCK MARKET INTELLIGENCE PLATFORM</text>
  <text x="600" y="188" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#475569" letter-spacing="6">行 情 分 析 智 能 助 手</text>
  <line x1="100" y1="248" x2="1100" y2="248" stroke="url(#accentLine)" stroke-width="1.5"/>
  <circle cx="600" cy="248" r="2.5" fill="#10b981" opacity="0.8"/><circle cx="580" cy="248" r="1.2" fill="#14b8a6" opacity="0.5"/><circle cx="620" cy="248" r="1.2" fill="#818cf8" opacity="0.5"/>
</svg>
